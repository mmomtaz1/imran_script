# qtask configuration
# CLI flags override these defaults.

jira:
  user: "mmomtaz"
  project: "PDK80"
  inst_file: "~/bin/installations.json"
  issue_type: "Task"

query:
  # Filter by status (e.g. Open, "In Progress", Closed). Leave empty for all.
